<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>网络测速工具</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
      color: #333;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      color: white;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    }

    .header p {
      opacity: 0.9;
      font-size: 1.1rem;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 30px;
      margin-bottom: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .info-item {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
    }

    .info-label {
      font-size: 0.85rem;
      color: #666;
      margin-bottom: 5px;
    }

    .info-value {
      font-size: 1.3rem;
      font-weight: 600;
      color: #333;
    }

    .test-section {
      text-align: center;
      padding: 20px 0;
    }

    .speed-display {
      font-size: 4rem;
      font-weight: 700;
      color: #667eea;
      margin: 20px 0;
      transition: all 0.3s ease;
    }

    .speed-unit {
      font-size: 1.2rem;
      color: #666;
      margin-left: 5px;
    }

    .progress-bar {
      width: 100%;
      height: 8px;
      background: #e9ecef;
      border-radius: 4px;
      overflow: hidden;
      margin: 20px 0;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
      width: 0%;
      transition: width 0.3s ease;
    }

    .controls {
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    button {
      padding: 15px 40px;
      font-size: 1.1rem;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn-start {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-start:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }

    .btn-start:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-ping {
      background: #f8f9fa;
      color: #333;
      border: 2px solid #e9ecef;
    }

    .btn-ping:hover:not(:disabled) {
      border-color: #667eea;
      color: #667eea;
    }

    .btn-stop {
      background: #dc3545;
      color: white;
    }

    .btn-stop:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(220, 53, 69, 0.4);
    }

    .btn-stop:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .results {
      margin-top: 30px;
      padding-top: 20px;
      border-top: 2px solid #e9ecef;
    }

    .result-item {
      display: flex;
      justify-content: space-between;
      padding: 15px 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .result-item:last-child {
      border-bottom: none;
    }

    .result-label {
      font-weight: 600;
      color: #666;
    }

    .result-value {
      font-weight: 700;
      color: #333;
    }

    .chart-container {
      background: #f8f9fa;
      border-radius: 12px;
      padding: 20px;
      margin-top: 20px;
    }

    .chart-container h3 {
      font-size: 1.1rem;
      color: #333;
      margin-bottom: 15px;
    }

    .status {
      font-size: 1rem;
      color: #666;
      margin-bottom: 10px;
    }

    .config-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }

    .config-item {
      text-align: left;
    }

    .config-item label {
      display: block;
      margin-bottom: 5px;
      font-weight: 600;
      color: #666;
    }

    .config-item select {
      width: 100%;
      padding: 10px;
      border: 2px solid #e9ecef;
      border-radius: 8px;
      font-size: 1rem;
    }

    .config-item select:focus {
      outline: none;
      border-color: #667eea;
    }

    @media (max-width: 600px) {
      .header h1 {
        font-size: 1.8rem;
      }

      .speed-display {
        font-size: 3rem;
      }

      .controls {
        flex-direction: column;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🚀 网络测速工具</h1>
      <p>测试不同网络连接的带宽和延迟</p>
    </div>

    <div class="card">
      <div class="info-grid">
        <div class="info-item">
          <div class="info-label">服务器 IP</div>
          <div class="info-value" id="serverIP">--</div>
        </div>
        <div class="info-item">
          <div class="info-label">客户端 IP</div>
          <div class="info-value" id="clientIP">--</div>
        </div>
        <div class="info-item">
          <div class="info-label">延迟</div>
          <div class="info-value" id="latency">-- ms</div>
        </div>
      </div>

      <div class="test-section">
        <div class="status" id="status">准备就绪</div>

        <div class="speed-display">
          <span id="speed">0.00</span>
          <span class="speed-unit">MB/s</span>
        </div>

        <div class="progress-bar">
          <div class="progress-fill" id="progressBar"></div>
        </div>

        <div class="config-grid">
          <div class="config-item">
            <label>测试模式</label>
            <select id="testMode">
              <option value="pre">📁 预生成文件</option>
              <option value="dynamic">⚡ 动态生成</option>
            </select>
          </div>
        </div>

        <div class="controls">
          <button class="btn-ping" onclick="testPing()" id="pingBtn">📡 测试延迟</button>
          <button class="btn-start" onclick="startSpeedTest()" id="startBtn">🚀 开始测速</button>
          <button class="btn-stop" onclick="stopSpeedTest()" id="stopBtn" style="display: none;">⏹️ 停止测试</button>
        </div>

        <div class="results" id="results" style="display: none;">
          <h3 style="margin-bottom: 15px; color: #333;">📊 测试结果</h3>
          <div class="result-item">
            <span class="result-label">平均速度</span>
            <span class="result-value" id="avgSpeed">0.00 MB/s</span>
          </div>
          <div class="result-item">
            <span class="result-label">峰值速度</span>
            <span class="result-value" id="peakSpeed">0.00 MB/s</span>
          </div>
          <div class="result-item">
            <span class="result-label">测试数据量</span>
            <span class="result-value" id="dataTransferred">0 MB</span>
          </div>
          <div class="result-item">
            <span class="result-label">测试用时</span>
            <span class="result-value" id="testDuration">0 秒</span>
          </div>
        </div>

        <div class="chart-container" id="chartContainer" style="display: none; margin-top: 30px;">
          <h3 style="margin-bottom: 15px; color: #333;">📈 速度趋势图</h3>
          <div id="speedChart" style="width: 100%; height: 300px;"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let isTesting = false;
    let abortController = null;
    let speedDataPoints = []; // 存储速度数据点 {time, speed}
    let chart = null; // ECharts 实例

    // 格式化速度（KB/s 或 MB/s）
    function formatSpeed(bytesPerSecond) {
      const mbPerSecond = bytesPerSecond / 1024 / 1024;
      if (mbPerSecond < 1) {
        const kbPerSecond = bytesPerSecond / 1024;
        return `${kbPerSecond.toFixed(2)} KB/s`;
      } else {
        return `${mbPerSecond.toFixed(2)} MB/s`;
      }
    }

    // 检测连接类型（保留但不再使用）
    async function testPing() {
      const btn = document.getElementById('pingBtn');
      btn.disabled = true;
      btn.textContent = '测试中...';

      try {
        const startTime = Date.now();
        const response = await fetch('/api/ping?t=' + Date.now());
        const data = await response.json();
        const endTime = Date.now();
        const latency = endTime - startTime;

        document.getElementById('latency').textContent = latency + ' ms';
        document.getElementById('serverIP').textContent = data.serverIP;
        document.getElementById('clientIP').textContent = data.clientIP;

        // 延迟评级
        let rating = '⚡ 超快';
        if (latency > 50) rating = '✅ 正常';
        if (latency > 100) rating = '⚠️ 较慢';
        if (latency > 200) rating = '🐌 很慢';

        document.getElementById('status').textContent = `延迟: ${latency}ms ${rating}`;
      } catch (error) {
        document.getElementById('latency').textContent = '错误';
        document.getElementById('status').textContent = '❌ 无法连接服务器';
      }

      btn.disabled = false;
      btn.textContent = '📡 测试延迟';
    }

    // 停止测速
    function stopSpeedTest() {
      if (abortController) {
        abortController.abort();
        abortController = null;
      }
      isTesting = false;
      document.getElementById('status').textContent = '⏸️ 测试已停止';
      resetButtons();
    }

    // 重置按钮状态
    function resetButtons() {
      const startBtn = document.getElementById('startBtn');
      startBtn.disabled = false;
      startBtn.textContent = '🚀 开始测速';
      startBtn.style.display = 'inline-block';
      document.getElementById('pingBtn').disabled = false;
      document.getElementById('stopBtn').style.display = 'none';
    }

    // 绘制速度趋势图
    function drawSpeedChart() {
      const chartContainer = document.getElementById('chartContainer');
      chartContainer.style.display = 'block';

      if (!chart) {
        chart = echarts.init(document.getElementById('speedChart'));
      }

      // 准备数据
      const times = speedDataPoints.map(point => point.time);
      const speeds = speedDataPoints.map(point => point.speed);

      // 计算平均速度
      const avgSpeed = speeds.reduce((a, b) => a + b, 0) / speeds.length;
      const peakSpeed = Math.max(...speeds);

      // 准备图表配置
      const option = {
        title: {
          text: `平均速度: ${formatSpeed(avgSpeed)} | 峰值速度: ${formatSpeed(peakSpeed)}`,
          left: 'center',
          textStyle: {
            fontSize: 14
          }
        },
        tooltip: {
          trigger: 'axis',
          formatter: function(params) {
            const time = params[0].axisValue;
            const speed = formatSpeed(params[0].value);
            return `时间: ${time}s<br/>速度: ${speed}`;
          }
        },
        grid: {
          left: '3%',
          right: '4%',
          bottom: '3%',
          top: '15%',
          containLabel: true
        },
        xAxis: {
          type: 'category',
          boundaryGap: false,
          data: times,
          name: '时间(秒)',
          nameLocation: 'middle',
          nameGap: 25
        },
        yAxis: {
          type: 'value',
          name: '速度(MB/s)',
          axisLabel: {
            formatter: function(value) {
              if (value < 1) {
                return value.toFixed(1);
              } else {
                return value.toFixed(1);
              }
            }
          }
        },
        series: [
          {
            name: '速度',
            type: 'line',
            smooth: true,
            data: speeds,
            lineStyle: {
              color: '#667eea',
              width: 2
            },
            areaStyle: {
              color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                { offset: 0, color: 'rgba(102, 126, 234, 0.3)' },
                { offset: 1, color: 'rgba(102, 126, 234, 0.05)' }
              ])
            },
            markPoint: {
              data: [
                {
                  type: 'max',
                  name: '峰值',
                  itemStyle: {
                    color: '#ff6b6b'
                  },
                  label: {
                    formatter: function(params) {
                      return formatSpeed(params.value);
                    }
                  }
                }
              ]
            },
            markLine: {
              silent: true,
              data: [
                {
                  type: 'average',
                  name: '平均值',
                  lineStyle: {
                    color: '#4ecdc4',
                    type: 'dashed'
                  },
                  label: {
                    formatter: function(params) {
                      return formatSpeed(params.value);
                    }
                  }
                }
              ]
            }
          }
        ]
      };

      chart.setOption(option);
    }

    // 开始测速
    async function startSpeedTest() {
      if (isTesting) return;
      isTesting = true;

      // 创建新的 AbortController
      abortController = new AbortController();
      const signal = abortController.signal;

      const startBtn = document.getElementById('startBtn');
      const pingBtn = document.getElementById('pingBtn');
      const stopBtn = document.getElementById('stopBtn');
      const testMode = document.getElementById('testMode').value;

      startBtn.style.display = 'none';
      pingBtn.disabled = true;
      stopBtn.style.display = 'inline-block';

      const startTime = Date.now();
      let totalBytes = 0;
      let speedSamples = [];
      let lastSpeed = 0;

      // 清空速度数据点
      speedDataPoints = [];

      document.getElementById('results').style.display = 'none';
      document.getElementById('chartContainer').style.display = 'none';
      const modeText = testMode === 'pre' ? '预生成文件' : '动态生成';
      document.getElementById('status').textContent = `📥 正在下载测试数据 (${modeText})...`;
      document.getElementById('progressBar').style.width = '0%';

      try {
        const apiUrl = testMode === 'pre' ? '/api/stream/pre' : '/api/stream/dynamic?size=200&chunk=100';
        const response = await fetch(apiUrl, { signal });

        if (!response.ok) {
          throw new Error('无法连接服务器');
        }

        const reader = response.body.getReader();
        const contentLength = 200 * 1024 * 1024; // 200MB
        let receivedLength = 0;
        let lastUpdateTime = startTime;
        let lastChartUpdateTime = startTime;

        while (true) {
          const { done, value } = await reader.read();

          if (done) break;

          receivedLength += value.length;
          const currentTime = Date.now();
          const elapsedTime = (currentTime - startTime) / 1000; // 秒

          // 计算当前速度
          const currentSpeedBytes = receivedLength / elapsedTime;
          speedSamples.push(currentSpeedBytes);

          // 记录速度数据点（每 1 秒记录一次）
          if (currentTime - lastChartUpdateTime >= 1000) {
            const speedMB = currentSpeedBytes / 1024 / 1024;
            speedDataPoints.push({
              time: elapsedTime.toFixed(1),
              speed: speedMB
            });
            lastChartUpdateTime = currentTime;
          }

          // 更新显示（使用格式化后的速度）
          const currentSpeedDisplay = formatSpeed(currentSpeedBytes);
          document.getElementById('speed').textContent = currentSpeedDisplay.replace(' MB/s', '').replace(' KB/s', '');
          document.getElementById('speed').nextElementSibling.textContent = currentSpeedDisplay.includes('KB/s') ? 'KB/s' : 'MB/s';
          document.getElementById('progressBar').style.width = ((receivedLength / contentLength) * 100) + '%';

          // 状态更新
          const progress = Math.floor((receivedLength / contentLength) * 100);
          document.getElementById('status').textContent = `📥 已下载 ${progress}% (${(receivedLength / 1024 / 1024).toFixed(0)} MB)`;

          // 限制更新频率（每 200ms）
          if (currentTime - lastUpdateTime >= 200) {
            lastUpdateTime = currentTime;
          }
        }

        const endTime = Date.now();
        const testDuration = (endTime - startTime) / 1000; // 秒

        // 计算统计数据
        const avgSpeedBytes = receivedLength / testDuration;
        const peakSpeedBytes = Math.max(...speedSamples);

        // 显示结果（使用格式化后的速度）
        document.getElementById('avgSpeed').textContent = formatSpeed(avgSpeedBytes);
        document.getElementById('peakSpeed').textContent = formatSpeed(peakSpeedBytes);
        document.getElementById('dataTransferred').textContent = (receivedLength / 1024 / 1024).toFixed(0) + ' MB';
        document.getElementById('testDuration').textContent = testDuration.toFixed(1) + ' 秒';

        // 速度评级
        let rating = '🚀 飞快';
        if (avgSpeedBytes < 10 * 1024 * 1024) rating = '🐢 很慢';
        else if (avgSpeedBytes < 30 * 1024 * 1024) rating = '📶 一般';
        else if (avgSpeedBytes < 50 * 1024 * 1024) rating = '✅ 不错';
        else if (avgSpeedBytes < 80 * 1024 * 1024) rating = '⚡ 很快';

        const modeText = testMode === 'pre' ? '预生成文件' : '动态生成';
        document.getElementById('status').textContent = `✅ 测试完成！(${modeText}) 平均速度: ${formatSpeed(avgSpeedBytes)} ${rating}`;
        document.getElementById('results').style.display = 'block';

        // 绘制速度趋势图
        if (speedDataPoints.length > 0) {
          drawSpeedChart();
        }

      } catch (error) {
        if (error.name === 'AbortError') {
          console.log('测试已停止');
          document.getElementById('status').textContent = '⏸️ 测试已停止';

          // 停止后也绘制图表（如果有数据）
          if (speedDataPoints.length > 0) {
            document.getElementById('results').style.display = 'block';
            drawSpeedChart();
          }
        } else {
          console.error('测速错误:', error);
          document.getElementById('status').textContent = '❌ 测试失败: ' + error.message;
        }
      }

      isTesting = false;
      abortController = null;
      resetButtons();
    }

    // 自动测试延迟
    setTimeout(testPing, 1000);
  </script>
</body>
</html>
