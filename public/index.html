<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>网络测速工具 - Network Speed Test</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    /* Modern Design System - SuperDesign */
    :root {
      /* Colors - oklch() for modern definition */
      --background: oklch(0.98 0 0);
      --foreground: oklch(0.145 0 0);
      --card-background: oklch(1 0 0);
      --primary: oklch(0.55 0.22 250);
      --primary-light: oklch(0.75 0.18 250);
      --primary-dark: oklch(0.40 0.22 250);
      --secondary: oklch(0.945 0.015 250);
      --accent: oklch(0.65 0.20 145);
      --muted: oklch(0.945 0.015 250);
      --muted-foreground: oklch(0.556 0.015 250);
      --border: oklch(0.90 0.015 250);
      --success: oklch(0.65 0.20 145);
      --warning: oklch(0.75 0.15 85);
      --danger: oklch(0.60 0.22 25);

      /* Spacing - 0.25rem base */
      --space-1: 0.25rem;
      --space-2: 0.5rem;
      --space-3: 0.75rem;
      --space-4: 1rem;
      --space-5: 1.25rem;
      --space-6: 1.5rem;
      --space-8: 2rem;
      --space-12: 3rem;
      --space-16: 4rem;

      /* Shadows - subtle */
      --shadow-sm: 0 1px 2px 0 oklch(0 0 0 / 0.05);
      --shadow: 0 1px 3px 0 oklch(0 0 0 / 0.1), 0 1px 2px -1px oklch(0 0 0 / 0.1);
      --shadow-md: 0 4px 6px -1px oklch(0 0 0 / 0.1), 0 2px 4px -2px oklch(0 0 0 / 0.1);
      --shadow-lg: 0 10px 15px -3px oklch(0 0 0 / 0.1), 0 4px 6px -4px oklch(0 0 0 / 0.1);
      --shadow-primary: 0 4px 14px 0 oklch(0.55 0.22 250 / 0.39);

      /* Border radius */
      --radius-sm: 0.375rem;
      --radius-md: 0.625rem;
      --radius-lg: 0.875rem;
      --radius-xl: 1rem;

      /* Typography */
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;

      /* Animation */
      --transition-fast: 150ms ease-out;
      --transition-base: 200ms ease-out;
      --transition-slow: 400ms ease-out;
    }

    /* Dark mode support */
    @media (prefers-color-scheme: dark) {
      :root {
        --background: oklch(0.145 0 0);
        --foreground: oklch(0.985 0 0);
        --card-background: oklch(0.17 0 0);
        --primary: oklch(0.65 0.22 250);
        --primary-light: oklch(0.75 0.18 250);
        --secondary: oklch(0.25 0.015 250);
        --muted: oklch(0.25 0.015 250);
        --muted-foreground: oklch(0.65 0.015 250);
        --border: oklch(0.25 0.015 250);
      }
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-sans);
      background: var(--background);
      min-height: 100vh;
      color: var(--foreground);
      line-height: 1.6;
      transition: background var(--transition-base), color var(--transition-base);
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: var(--space-6) var(--space-4);
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: var(--space-12);
      animation: fadeIn 500ms ease-out;
    }

    .header h1 {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: var(--space-2);
      background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.025em;
    }

    .header p {
      color: var(--muted-foreground);
      font-size: 1.1rem;
      font-weight: 500;
    }

    /* Card */
    .card {
      background: var(--card-background);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: var(--space-8);
      margin-bottom: var(--space-6);
      box-shadow: var(--shadow-lg);
      animation: slideUp 400ms ease-out;
    }

    /* Info Grid */
    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: var(--space-5);
      margin-bottom: var(--space-8);
    }

    .info-item {
      background: var(--muted);
      padding: var(--space-5);
      border-radius: var(--radius-lg);
      text-align: center;
      transition: transform var(--transition-base), box-shadow var(--transition-base);
      border: 1px solid var(--border);
    }

    .info-item:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }

    .info-label {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--muted-foreground);
      margin-bottom: var(--space-2);
      text-transform: uppercase;
      letter-spacing: 0.025em;
    }

    .info-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--foreground);
      font-family: var(--font-mono);
    }

    /* Test Section */
    .test-section {
      text-align: center;
      padding: var(--space-6) 0;
    }

    .status {
      font-size: 1rem;
      color: var(--muted-foreground);
      font-weight: 500;
      margin-bottom: var(--space-4);
      min-height: 1.6em;
    }

    /* Speed Display */
    .speed-display {
      font-size: 5rem;
      font-weight: 700;
      color: var(--primary);
      margin: var(--space-6) 0;
      font-family: var(--font-mono);
      letter-spacing: -0.05em;
      line-height: 1;
      transition: all var(--transition-base);
    }

    .speed-unit {
      font-size: 1.25rem;
      color: var(--muted-foreground);
      margin-left: var(--space-2);
      font-weight: 500;
    }

    /* Progress Bar */
    .progress-bar {
      width: 100%;
      height: 10px;
      background: var(--muted);
      border-radius: var(--radius-md);
      overflow: hidden;
      margin: var(--space-6) 0;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary) 0%, var(--accent) 100%);
      width: 0%;
      transition: width var(--transition-base);
      border-radius: var(--radius-md);
    }

    /* Controls */
    .controls {
      display: flex;
      gap: var(--space-4);
      justify-content: center;
      flex-wrap: wrap;
      margin-top: var(--space-8);
    }

    button {
      padding: var(--space-4) var(--space-8);
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all var(--transition-base);
      font-family: var(--font-sans);
      letter-spacing: 0.01em;
      position: relative;
      overflow: hidden;
    }

    /* Button press animation */
    button:active:not(:disabled) {
      transform: scale(0.95);
    }

    .btn-start {
      background: var(--primary);
      color: white;
      box-shadow: var(--shadow-primary);
    }

    .btn-start:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px oklch(0.55 0.22 250 / 0.4);
    }

    .btn-start:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .btn-ping {
      background: var(--muted);
      color: var(--foreground);
      border: 2px solid var(--border);
    }

    .btn-ping:hover:not(:disabled) {
      border-color: var(--primary);
      color: var(--primary);
      background: var(--secondary);
    }

    .btn-stop {
      background: var(--danger);
      color: white;
      box-shadow: 0 4px 14px oklch(0.60 0.22 25 / 0.39);
    }

    .btn-stop:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px oklch(0.60 0.22 25 / 0.4);
    }

    .btn-stop:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* Config Grid */
    .config-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: var(--space-5);
      margin-bottom: var(--space-8);
    }

    .config-item {
      text-align: left;
    }

    .config-item label {
      display: block;
      margin-bottom: var(--space-2);
      font-weight: 600;
      color: var(--foreground);
      font-size: 0.9rem;
    }

    .config-item select {
      width: 100%;
      padding: var(--space-3) var(--space-4);
      border: 2px solid var(--border);
      border-radius: var(--radius-md);
      font-size: 1rem;
      background: var(--card-background);
      color: var(--foreground);
      font-family: var(--font-sans);
      transition: border-color var(--transition-base), box-shadow var(--transition-base);
      cursor: pointer;
    }

    .config-item select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px oklch(0.55 0.22 250 / 0.1);
    }

    .config-item select:hover {
      border-color: var(--primary-light);
    }

    /* Results */
    .results {
      margin-top: var(--space-8);
      padding-top: var(--space-6);
      border-top: 2px solid var(--border);
      animation: fadeIn 400ms ease-out;
    }

    .results h3 {
      font-size: 1.25rem;
      color: var(--foreground);
      margin-bottom: var(--space-6);
      font-weight: 700;
    }

    .result-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--space-4) var(--space-5);
      border-bottom: 1px solid var(--border);
      transition: background var(--transition-base);
      border-radius: var(--radius-sm);
    }

    .result-item:hover {
      background: var(--muted);
    }

    .result-item:last-child {
      border-bottom: none;
    }

    .result-label {
      font-weight: 600;
      color: var(--muted-foreground);
      font-size: 0.95rem;
    }

    .result-value {
      font-weight: 700;
      color: var(--foreground);
      font-family: var(--font-mono);
      font-size: 1.1rem;
    }

    /* Chart Container */
    .chart-container {
      background: var(--muted);
      border-radius: var(--radius-lg);
      padding: var(--space-6);
      margin-top: var(--space-8);
      border: 1px solid var(--border);
      animation: fadeIn 400ms ease-out;
    }

    .chart-container h3 {
      font-size: 1.25rem;
      color: var(--foreground);
      margin-bottom: var(--space-5);
      font-weight: 700;
    }

    /* Animations */
    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.5;
      }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .container {
        padding: var(--space-4) var(--space-3);
      }

      .card {
        padding: var(--space-6);
      }

      .header h1 {
        font-size: 1.8rem;
      }

      .speed-display {
        font-size: 3.5rem;
      }

      .info-grid {
        grid-template-columns: 1fr;
      }

      .controls {
        flex-direction: column;
        width: 100%;
      }

      button {
        width: 100%;
      }

      .config-grid {
        grid-template-columns: 1fr;
      }
    }

    /* Loading state */
    .loading {
      animation: pulse 1.5s ease-in-out infinite;
    }

    /* Status colors */
    .status-success {
      color: var(--success);
    }

    .status-error {
      color: var(--danger);
    }

    .status-warning {
      color: var(--warning);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🚀 网络测速工具</h1>
      <p>测试不同网络连接的带宽和延迟</p>
    </div>

    <div class="card">
      <div class="info-grid">
        <div class="info-item">
          <div class="info-label">服务器 IP</div>
          <div class="info-value" id="serverIP">--</div>
        </div>
        <div class="info-item">
          <div class="info-label">客户端 IP</div>
          <div class="info-value" id="clientIP">--</div>
        </div>
        <div class="info-item">
          <div class="info-label">延迟</div>
          <div class="info-value" id="latency">-- ms</div>
        </div>
      </div>

      <div class="test-section">
        <div class="status" id="status">准备就绪</div>

        <div class="speed-display">
          <span id="speed">0.00</span>
          <span class="speed-unit">MB/s</span>
        </div>

        <div class="progress-bar">
          <div class="progress-fill" id="progressBar"></div>
        </div>

        <div class="config-grid">
          <div class="config-item">
            <label>测试模式</label>
            <select id="testMode">
              <option value="pre">📁 预生成文件</option>
              <option value="dynamic">⚡ 动态生成</option>
            </select>
          </div>
        </div>

        <div class="controls">
          <button class="btn-ping" onclick="testPing()" id="pingBtn">📡 测试延迟</button>
          <button class="btn-start" onclick="startSpeedTest()" id="startBtn">🚀 开始测速</button>
          <button class="btn-stop" onclick="stopSpeedTest()" id="stopBtn" style="display: none;">⏹️ 停止测试</button>
        </div>

        <div class="results" id="results" style="display: none;">
          <h3>📊 测试结果</h3>
          <div class="result-item">
            <span class="result-label">平均速度</span>
            <span class="result-value" id="avgSpeed">0.00 MB/s</span>
          </div>
          <div class="result-item">
            <span class="result-label">峰值速度</span>
            <span class="result-value" id="peakSpeed">0.00 MB/s</span>
          </div>
          <div class="result-item">
            <span class="result-label">测试数据量</span>
            <span class="result-value" id="dataTransferred">0 MB</span>
          </div>
          <div class="result-item">
            <span class="result-label">测试用时</span>
            <span class="result-value" id="testDuration">0 秒</span>
          </div>
        </div>

        <div class="chart-container" id="chartContainer" style="display: none; margin-top: 40px;">
          <h3>📈 速度趋势图</h3>
          <div id="speedChart" style="width: 100%; height: 320px;"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let isTesting = false;
    let abortController = null;
    let speedDataPoints = [];
    let chart = null;

    // 格式化速度（KB/s 或 MB/s）
    function formatSpeed(bytesPerSecond) {
      const mbPerSecond = bytesPerSecond / 1024 / 1024;
      if (mbPerSecond < 1) {
        const kbPerSecond = bytesPerSecond / 1024;
        return `${kbPerSecond.toFixed(2)} KB/s`;
      } else {
        return `${mbPerSecond.toFixed(2)} MB/s`;
      }
    }

    // 测试延迟
    async function testPing() {
      const btn = document.getElementById('pingBtn');
      btn.disabled = true;
      btn.textContent = '测试中...';

      try {
        const startTime = Date.now();
        const response = await fetch('/api/ping?t=' + Date.now());
        const data = await response.json();
        const endTime = Date.now();
        const latency = endTime - startTime;

        document.getElementById('latency').textContent = latency + ' ms';
        document.getElementById('serverIP').textContent = data.serverIP;
        document.getElementById('clientIP').textContent = data.clientIP;

        // 延迟评级
        let rating = '⚡ 超快';
        if (latency > 50) rating = '✅ 正常';
        if (latency > 100) rating = '⚠️ 较慢';
        if (latency > 200) rating = '🐌 很慢';

        const statusEl = document.getElementById('status');
        statusEl.textContent = `延迟: ${latency}ms ${rating}`;
        statusEl.className = 'status status-success';
      } catch (error) {
        document.getElementById('latency').textContent = '错误';
        const statusEl = document.getElementById('status');
        statusEl.textContent = '❌ 无法连接服务器';
        statusEl.className = 'status status-error';
      }

      btn.disabled = false;
      btn.textContent = '📡 测试延迟';
    }

    // 停止测速
    function stopSpeedTest() {
      if (abortController) {
        abortController.abort();
        abortController = null;
      }
      isTesting = false;
      const statusEl = document.getElementById('status');
      statusEl.textContent = '⏸️ 测试已停止';
      statusEl.className = 'status status-warning';
      resetButtons();
    }

    // 重置按钮状态
    function resetButtons() {
      const startBtn = document.getElementById('startBtn');
      startBtn.disabled = false;
      startBtn.textContent = '🚀 开始测速';
      startBtn.style.display = 'inline-block';
      document.getElementById('pingBtn').disabled = false;
      document.getElementById('stopBtn').style.display = 'none';
    }

    // 绘制速度趋势图
    function drawSpeedChart() {
      const chartContainer = document.getElementById('chartContainer');
      chartContainer.style.display = 'block';

      if (!chart) {
        chart = echarts.init(document.getElementById('speedChart'));
      }

      const times = speedDataPoints.map(point => point.time);
      const speeds = speedDataPoints.map(point => point.speed);

      const avgSpeed = speeds.reduce((a, b) => a + b, 0) / speeds.length;
      const peakSpeed = Math.max(...speeds);

      const option = {
        title: {
          text: `平均速度: ${formatSpeed(avgSpeed)} | 峰值速度: ${formatSpeed(peakSpeed)}`,
          left: 'center',
          textStyle: {
            fontSize: 14,
            fontWeight: 600
          }
        },
        tooltip: {
          trigger: 'axis',
          formatter: function(params) {
            const time = params[0].axisValue;
            const speed = formatSpeed(params[0].value * 1024 * 1024);
            return `时间: ${time}s<br/>速度: ${speed}`;
          }
        },
        grid: {
          left: '3%',
          right: '4%',
          bottom: '3%',
          top: '15%',
          containLabel: true
        },
        xAxis: {
          type: 'category',
          boundaryGap: false,
          data: times,
          name: '时间(秒)',
          nameLocation: 'middle',
          nameGap: 25,
          axisLine: {
            lineStyle: {
              color: 'var(--muted-foreground)'
            }
          }
        },
        yAxis: {
          type: 'value',
          name: '速度(MB/s)',
          axisLabel: {
            formatter: function(value) {
              return value.toFixed(1);
            },
            color: 'var(--muted-foreground)'
          },
          axisLine: {
            lineStyle: {
              color: 'var(--muted-foreground)'
            }
          },
          splitLine: {
            lineStyle: {
              color: 'var(--border)'
            }
          }
        },
        series: [
          {
            name: '速度',
            type: 'line',
            smooth: true,
            data: speeds,
            lineStyle: {
              color: '#6366f1',
              width: 2
            },
            areaStyle: {
              color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                { offset: 0, color: 'rgba(99, 102, 241, 0.3)' },
                { offset: 1, color: 'rgba(99, 102, 241, 0.05)' }
              ])
            },
            markPoint: {
              data: [
                {
                  type: 'max',
                  name: '峰值',
                  itemStyle: {
                    color: '#ef4444'
                  },
                  label: {
                    formatter: function(params) {
                      return formatSpeed(params.value * 1024 * 1024);
                    }
                  }
                }
              ]
            },
            markLine: {
              silent: true,
              data: [
                {
                  type: 'average',
                  name: '平均值',
                  lineStyle: {
                    color: '#10b981',
                    type: 'dashed'
                  },
                  label: {
                    formatter: function(params) {
                      return formatSpeed(params.value * 1024 * 1024);
                    }
                  }
                }
              ]
            }
          }
        ]
      };

      chart.setOption(option);
    }

    // 开始测速
    async function startSpeedTest() {
      if (isTesting) return;
      isTesting = true;

      abortController = new AbortController();
      const signal = abortController.signal;

      const startBtn = document.getElementById('startBtn');
      const pingBtn = document.getElementById('pingBtn');
      const stopBtn = document.getElementById('stopBtn');
      const testMode = document.getElementById('testMode').value;

      startBtn.style.display = 'none';
      pingBtn.disabled = true;
      stopBtn.style.display = 'inline-block';

      const startTime = Date.now();
      let totalBytes = 0;
      let speedSamples = [];
      let lastSpeed = 0;

      speedDataPoints = [];

      document.getElementById('results').style.display = 'none';
      document.getElementById('chartContainer').style.display = 'none';
      const modeText = testMode === 'pre' ? '预生成文件' : '动态生成';
      const statusEl = document.getElementById('status');
      statusEl.textContent = `📥 正在下载测试数据 (${modeText})...`;
      statusEl.className = 'status';
      document.getElementById('progressBar').style.width = '0%';

      try {
        const apiUrl = testMode === 'pre' ? '/api/stream/pre' : '/api/stream/dynamic?size=200&chunk=100';
        const response = await fetch(apiUrl, { signal });

        if (!response.ok) {
          throw new Error('无法连接服务器');
        }

        const reader = response.body.getReader();
        const contentLength = 200 * 1024 * 1024;
        let receivedLength = 0;
        let lastUpdateTime = startTime;
        let lastChartUpdateTime = startTime;

        while (true) {
          const { done, value } = await reader.read();

          if (done) break;

          receivedLength += value.length;
          const currentTime = Date.now();
          const elapsedTime = (currentTime - startTime) / 1000;

          const currentSpeedBytes = receivedLength / elapsedTime;
          speedSamples.push(currentSpeedBytes);

          if (currentTime - lastChartUpdateTime >= 1000) {
            const speedMB = currentSpeedBytes / 1024 / 1024;
            speedDataPoints.push({
              time: elapsedTime.toFixed(1),
              speed: speedMB
            });
            lastChartUpdateTime = currentTime;
          }

          const currentSpeedDisplay = formatSpeed(currentSpeedBytes);
          document.getElementById('speed').textContent = currentSpeedDisplay.replace(' MB/s', '').replace(' KB/s', '');
          document.getElementById('speed').nextElementSibling.textContent = currentSpeedDisplay.includes('KB/s') ? 'KB/s' : 'MB/s';
          document.getElementById('progressBar').style.width = ((receivedLength / contentLength) * 100) + '%';

          const progress = Math.floor((receivedLength / contentLength) * 100);
          statusEl.textContent = `📥 已下载 ${progress}% (${(receivedLength / 1024 / 1024).toFixed(0)} MB)`;

          if (currentTime - lastUpdateTime >= 200) {
            lastUpdateTime = currentTime;
          }
        }

        const endTime = Date.now();
        const testDuration = (endTime - startTime) / 1000;

        const avgSpeedBytes = receivedLength / testDuration;
        const peakSpeedBytes = Math.max(...speedSamples);

        document.getElementById('avgSpeed').textContent = formatSpeed(avgSpeedBytes);
        document.getElementById('peakSpeed').textContent = formatSpeed(peakSpeedBytes);
        document.getElementById('dataTransferred').textContent = (receivedLength / 1024 / 1024).toFixed(0) + ' MB';
        document.getElementById('testDuration').textContent = testDuration.toFixed(1) + ' 秒';

        let rating = '🚀 飞快';
        if (avgSpeedBytes < 10 * 1024 * 1024) rating = '🐢 很慢';
        else if (avgSpeedBytes < 30 * 1024 * 1024) rating = '📶 一般';
        else if (avgSpeedBytes < 50 * 1024 * 1024) rating = '✅ 不错';
        else if (avgSpeedBytes < 80 * 1024 * 1024) rating = '⚡ 很快';

        statusEl.textContent = `✅ 测试完成！(${modeText}) 平均速度: ${formatSpeed(avgSpeedBytes)} ${rating}`;
        statusEl.className = 'status status-success';
        document.getElementById('results').style.display = 'block';

        if (speedDataPoints.length > 0) {
          drawSpeedChart();
        }

      } catch (error) {
        if (error.name === 'AbortError') {
          console.log('测试已停止');
          statusEl.textContent = '⏸️ 测试已停止';
          statusEl.className = 'status status-warning';

          if (speedDataPoints.length > 0) {
            document.getElementById('results').style.display = 'block';
            drawSpeedChart();
          }
        } else {
          console.error('测速错误:', error);
          statusEl.textContent = '❌ 测试失败: ' + error.message;
          statusEl.className = 'status status-error';
        }
      }

      isTesting = false;
      abortController = null;
      resetButtons();
    }

    setTimeout(testPing, 1000);
  </script>
</body>
</html>
